# kagi-curator configuration
# Set KAGI_API_KEY environment variable for Kagi API access.
# Set SMTP_PASSWORD environment variable for email delivery.
# Sections and subsections are processed in the order listed here.

# Email delivery (optional). Remove or omit to skip email delivery.
# Uncomment and fill in to enable:
# email:
#   smtp_host: smtp.gmail.com
#   smtp_port: 587
#   use_tls: true
#   smtp_username: you@example.com
#   # smtp_password: ""  # prefer SMTP_PASSWORD env var
#   from_address: you@example.com
#   from_name: Daily News Digest
#   to_addresses:
#     - recipient@example.com
#   subject: "Daily News Digest"

sections:
  - name: Vermont
    subsections:
      - name: Statewide
        article_limit: 5
        queries:
          - Vermont news today
          - Vermont politics
          - Vermont economy
        data_sources:
          - type: kagi
          - type: rss
            url: https://vtdigger.org/feed

      - name: Lamoille County
        article_limit: 3
        queries:
          - Lamoille County Vermont
          - Morrisville Vermont news
          - Stowe Vermont news
        data_sources:
          - type: kagi

  - name: Missouri
    subsections:
      - name: Statewide
        article_limit: 5
        queries:
          - Missouri news today
          - Missouri politics
          - Missouri economy
        data_sources:
          - type: kagi

      - name: St. Louis
        article_limit: 3
        queries:
          - St. Louis news today
          - St. Louis Missouri
        data_sources:
          - type: kagi

      - name: Kansas City
        article_limit: 3
        queries:
          - Kansas City news today
          - Kansas City Missouri
        data_sources:
          - type: kagi

  - name: Illinois
    subsections:
      - name: Statewide
        article_limit: 5
        queries:
          - Illinois news today
          - Illinois politics
          - Illinois economy
        data_sources:
          - type: kagi

      - name: Chicago
        article_limit: 3
        queries:
          - Chicago news today
          - Chicago Illinois
        data_sources:
          - type: kagi

      - name: Downstate Illinois
        article_limit: 3
        queries:
          - downstate Illinois news
          - Springfield Illinois news
        data_sources:
          - type: kagi

  - name: National
    subsections:
      - name: Top Stories
        article_limit: 5
        queries:
          - top US news today
          - US politics today
        data_sources:
          - type: kagi
