# kagi-curator configuration
# Set KAGI_API_KEY environment variable for Kagi API access.
# Sections and subsections are processed in the order listed here.

[[sections]]
name = "Vermont"

[[sections.subsections]]
name = "Statewide"
article_limit = 5
queries = [
    "Vermont news today",
    "Vermont politics",
    "Vermont economy",
]

[[sections.subsections.data_sources]]
type = "kagi"

[[sections.subsections.data_sources]]
type = "rss"
url = "https://vtdigger.org/feed"

[[sections.subsections]]
name = "Lamoille County"
article_limit = 3
queries = [
    "Lamoille County Vermont",
    "Morrisville Vermont news",
    "Stowe Vermont news",
]

[[sections.subsections.data_sources]]
type = "kagi"

[[sections]]
name = "National"

[[sections.subsections]]
name = "Top Stories"
article_limit = 5
queries = [
    "top US news today",
    "US politics today",
]

[[sections.subsections.data_sources]]
type = "kagi"
